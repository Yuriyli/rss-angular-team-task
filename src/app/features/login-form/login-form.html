<div class="login-form">
  <h2 class="login-form__title">{{ title() }}</h2>

  <div class="login-form__field">
    <label class="login-form__label" for="username">Username</label>
    <input class="login-form__input" id="username" type="text" placeholder="Enter username" [(ngModel)]="username" />
  </div>

  <div class="login-form__field">
    <label class="login-form__label" for="password">Password</label>
    <input class="login-form__input" id="password" type="password" placeholder="Enter password" [(ngModel)]="password" />
  </div>

  <button class="login-form__btn" [disabled]="!username || !password" (click)="onSubmit()">{{ submitLabel() }}
  </button>
</div>
