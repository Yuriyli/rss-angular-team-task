<div class="main">
  <h1 class="main__title">Crypto Dashboard</h1>
  <p class="main__subtitle">Welcome to the exchange</p>

  <div class="main__market-grid">
    @for (pair of pairs; track pair.symbol) {
      <app-market-card
        [symbol]="pair.symbol"
        [price]="pair.price"
        [change24h]="pair.change24h"
        [volume]="pair.volume"
        (cardClick)="onCardClick($event)"
      />
    }
  </div>
</div>
